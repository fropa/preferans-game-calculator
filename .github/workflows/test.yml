name: Inspect DigitalOcean Server

on:
  workflow_dispatch: {}

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Check raw connectivity
        run: |
          echo "Testing host/port..."
          nc -vz "${{ secrets.DEPLOY_HOST }}" "${{ secrets.DEPLOY_PORT }}"

      - name: Run remote inspection
        run: |
          ssh -vv \
            -i ~/.ssh/id_ed25519 \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
            set -x

            echo "=== BASIC ==="
            whoami
            sudo cat /etc/ssh/sshd_config
            sudo netstat -tulpn
