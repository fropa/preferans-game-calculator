<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preferans</title>

  <link rel="stylesheet" href="styles.css?v=20260312b2" />
</head>
<body>
  <div class="container">

    <!-- SETUP -->
    <div id="screen-setup" class="screen">
      <h1>Preferans</h1>
      <div class="subtitle">Final settlement calculator</div>

      <!-- GAME -->
      <div class="section">
        <label class="section-label">Played to</label>
        <input
          id="game-pulya"
          type="number"
          inputmode="numeric"
          class="line-input big"
        />
        <div class="helper">
          Enter the pulya the game was played to
        </div>
      </div>

      <!-- PLAYERS -->
      <div class="section">
        <label class="section-label">Players</label>

        <div class="card-grid">
          <div class="card">
            <div class="card-head">
              <div class="card-kicker">North</div>
            </div>
            <input id="player-name-0" class="line-input name" placeholder="Player 1" autocomplete="nickname" />
          </div>
          <div class="card">
            <div class="card-head">
              <div class="card-kicker">East</div>
            </div>
            <input id="player-name-1" class="line-input name" placeholder="Player 2" autocomplete="nickname" />
          </div>
          <div class="card" id="player-card-2">
            <div class="card-head">
              <div class="card-kicker">South</div>
              <button id="remove-player-2" class="icon-btn" type="button" onclick="removeLastPlayer()" aria-label="Remove player">-</button>
            </div>
            <input id="player-name-2" class="line-input name" placeholder="Player 3" autocomplete="nickname" />
          </div>
          <div class="card" id="player-card-3">
            <div class="card-head">
              <div class="card-kicker">West</div>
              <button id="remove-player-3" class="icon-btn" type="button" onclick="removeLastPlayer()" aria-label="Remove player">-</button>
            </div>
            <input id="player-name-3" class="line-input name" placeholder="Player 4 (optional)" autocomplete="nickname" />
          </div>
        </div>
        <div class="player-actions">
          <button id="add-player-btn" class="secondary" type="button" onclick="addPlayer()">Add player</button>
        </div>
        <div class="helper">Names are remembered on this device.</div>
      </div>

      <button class="primary" onclick="startGame()">Start</button>
      <button class="secondary" onclick="openHistory()">History</button>
    </div>

    <!-- HISTORY -->
    <div id="screen-history" class="screen hidden">
      <h1>History</h1>
      <div id="history-list" class="section"></div>
      <div class="button-row">
        <button class="secondary" onclick="show('screen-setup')">Back</button>
        <button class="secondary" onclick="clearHistory()">Clear</button>
      </div>
    </div>

    <!-- INPUT -->
    <div id="screen-input" class="screen hidden">
      <h1 id="current-player-name"></h1>

      <div class="section">
        <label class="section-label">Gora</label>
        <input
          id="gora-input"
          type="number"
          inputmode="numeric"
          class="line-input big"
        />
      </div>

      <div class="section">
        <label class="section-label">Vists</label>
        <div id="whists-container"></div>
      </div>

      <button class="primary" onclick="savePlayerAndNext()">Next</button>
    </div>

    <!-- REVIEW -->
    <div id="screen-review" class="screen hidden">
      <h1>Review</h1>
      <div id="review-list" class="section"></div>
      <button class="primary" onclick="calculateFinal()">Calculate</button>
    </div>

    <!-- FINAL -->
    <div id="screen-final" class="screen hidden">
      <h1>Result</h1>
      <div id="podium" class="section"></div>
      <div id="final-results" class="section"></div>
      <button class="secondary" onclick="openHistory()">History</button>
      <button class="secondary" onclick="location.reload()">New game</button>
    </div>

  </div>

  <script src="app.js?v=20260312b2"></script>
</body>
</html>
